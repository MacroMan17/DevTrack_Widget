<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#0f172a" rx="32"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left circle (GitHub - Green) -->
  <circle cx="85" cy="128" r="55" fill="url(#grad1)" opacity="0.9"/>
  
  <!-- Right circle (LeetCode - Orange) -->
  <circle cx="171" cy="128" r="55" fill="url(#grad2)" opacity="0.9"/>
  
  <!-- Overlap area (blend) -->
  <circle cx="128" cy="128" r="35" fill="#00ff88" opacity="0.3"/>
  
  <!-- GitHub icon (left) -->
  <g transform="translate(85, 128)">
    <!-- Octocat simplified -->
    <circle cx="0" cy="-8" r="6" fill="#0f172a"/>
    <circle cx="-6" cy="0" r="5" fill="#0f172a"/>
    <circle cx="6" cy="0" r="5" fill="#0f172a"/>
    <path d="M -8 8 Q 0 12 8 8" stroke="#0f172a" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- LeetCode icon (right) -->
  <g transform="translate(171, 128)">
    <!-- Code brackets -->
    <path d="M -8 -8 L -12 0 L -8 8" stroke="#0f172a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 8 -8 L 12 0 L 8 8" stroke="#0f172a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-2" y1="-10" x2="2" y2="10" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Center accent line -->
  <line x1="128" y1="60" x2="128" y2="196" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  
  <!-- Top label -->
  <text x="128" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00ff88" text-anchor="middle">DevTrack</text>
  
  <!-- Bottom label -->
  <text x="128" y="240" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff" text-anchor="middle" opacity="0.8">Widget</text>
</svg>
